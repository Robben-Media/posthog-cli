version: 2

project_name: posthog-cli

changelog:
  disable: true

builds:
  - id: posthog
    main: ./cmd/posthog
    binary: posthog-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: posthog_darwin
    main: ./cmd/posthog
    binary: posthog-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/posthog-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64

archives:
  - ids:
      - posthog
      - posthog_darwin
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
